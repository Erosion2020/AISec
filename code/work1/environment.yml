name: covid-regression
channels:
  - pytorch
  - nvidia                # CUDA runtime（cudart, cublas 等）
  - conda-forge
  - defaults

dependencies:
  - python=3.11
  - pytorch>=2.0
  - pytorch-cuda=12.4     # 强制 CUDA 版本，避免回退到 CPU
  - numpy>=1.21
  - pandas>=1.3
  - tqdm>=4.60
  - tensorboard>=2.12
  - setuptools=75.6.0            # tensorboard 2.x 需要 pkg_resources
  - graphviz              # torchviz 的系统级依赖（提供 dot.exe）
  - pip
  - pip:
    - torchviz
